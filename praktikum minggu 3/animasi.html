<!DOCTYPE html>

<html>
<head>
    <title>Efek Animasi jQuery</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
       
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

       
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 450px;
        }

       
        h2 {
            color: #1f2937;
            margin-top: 0;
            margin-bottom: 10px;
        }
        p {
            color: #4b5563;
            font-size: 15px;
            margin-bottom: 20px;
        }

       
        .info-box {
            background-color: #eef2ff;
            color: #4f46e5;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid #c7d2fe;
            text-align: left;
            margin-bottom: 25px;
            line-height: 1.5;
        }

       
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

       
        .animation-area {
            position: relative; 
            height: 140px; 
            background-color: #f9fafb;
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            display: flex;
            justify-content: center;
        }

        
        .box {
            background: linear-gradient(135deg, #34d399 0%, #059669 100%);
            height: 100px;
            width: 100px;
            position: absolute; 
            top: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(5, 150, 105, 0.3);
        }
    </style>

    <script>
        $(document).ready(function() {
            
            $("button").click(function() {
            
                $(".box").animate({
                    height: 'toggle' 
                });
            });
        });
    </script>
</head>
<body>

    <div class="container">
        <h2>Uji Coba Animasi</h2>
        <p>Nama: Annasya Maulafidatu Zahra NIM: 2311102246</p>
        <p>Klik tombol di bawah ini berkali-kali untuk melihat efek animasinya berjalan bergantian.</p>
        
        <button>Mulai Animasi</button>


        <div class="animation-area">
            <div class="box"></div>
        </div>
    </div>

</body>
</html>
